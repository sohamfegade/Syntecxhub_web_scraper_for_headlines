# ==============================================================
# NewsScrape Pro — Default Configuration
# ==============================================================
# This file ships with the repository and holds factory defaults.
# User overrides are written to  config/user_settings.ini  which
# is git-ignored so personal preferences never leak into commits.
# ==============================================================

[application]
name = NewsScrape Pro
version = 1.0.0
author = NewsScrape Pro Team
window_width = 1400
window_height = 850
theme = dark
language = en

[scraper]
# Maximum seconds to wait for a single HTTP response
request_timeout = 15
# How many times to retry a failed request before giving up
retry_count = 3
# Base delay (seconds) between consecutive requests to the same host
request_delay = 2.0
# Rotate a random User-Agent string on every request
random_user_agent = true
# Check and honour robots.txt before scraping a domain
respect_robots_txt = true
# Number of worker threads for parallel scraping
max_threads = 4

[database]
# Relative path from project root
path = database/newsscrape.db
# Automatically save every scrape result to the database
auto_save = true

[export]
# Relative path from project root
folder = exports
# Automatically export after every scrape run
auto_export = false
# Default export format: csv | json | excel
default_format = csv

[scheduler]
# Whether the scheduler is enabled on startup
enabled = false
# Default interval in minutes
interval_minutes = 60

[logging]
# Relative path from project root
file = logs/scraper.log
# Logging level: DEBUG | INFO | WARNING | ERROR | CRITICAL
level = INFO
# Maximum size per log file in bytes (5 MB)
max_bytes = 5242880
# Number of rotated backup log files to keep
backup_count = 5

[ui]
# Sidebar width in pixels
sidebar_width = 220
# Enable smooth animations and transitions
animations = true
# Number of rows visible in headline tables
table_page_size = 50
